<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="game-title">TETRIS</h1>
  <div class="wrapper">
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section records">
          <span class="label">RECORDS</span>
          <ol id="records-list" class="records-list"></ol>
          <div class="records-best">
            <span>Mejor combo: <b id="best-combo">0</b></span>
            <span>Máx. líneas: <b id="best-lines">0</b></span>
          </div>
          <button id="reset-records-btn">Borrar records</button>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="record-entry" class="record-entry hidden">
          <p class="record-entry-msg">¡Nuevo record! Escribe tu nombre:</p>
          <input id="player-name" maxlength="12" placeholder="Tu nombre" autocomplete="off" />
          <button id="save-record-btn">Guardar</button>
        </div>
        <div id="overlay-records" class="overlay-records hidden">
          <span class="label">RECORDS</span>
          <ol id="overlay-records-list" class="records-list"></ol>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
